name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer

jobs:
  lint:
    name: Lint
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install SwiftLint
        run: brew install swiftlint
      
      - name: Run SwiftLint
        run: swiftlint lint --strict
  
  format-check:
    name: Format Check
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install SwiftFormat
        run: brew install swiftformat
      
      - name: Check formatting
        run: swiftformat . --config .swiftformat --lint

  build-and-test:
    name: Build & Test
    runs-on: macos-14
    strategy:
      matrix:
        destination:
          - platform=macOS
          - platform=iOS Simulator,name=iPhone 15 Pro
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
      
      - name: Show Xcode version
        run: xcodebuild -version
      
      - name: Show Swift version
        run: swift --version
      
      - name: Resolve dependencies
        run: swift package resolve
      
      - name: Build
        run: swift build -c release
        
      - name: Run tests (macOS)
        if: matrix.destination == 'platform=macOS'
        run: swift test
      
      - name: Run tests (iOS)
        if: contains(matrix.destination, 'iOS Simulator')
        run: |
          xcodebuild test \
            -scheme TinyBrain-Package \
            -destination "${{ matrix.destination }}" \
            -enableCodeCoverage YES

  docs:
    name: Documentation
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
      
      - name: Generate documentation
        run: |
          swift package generate-documentation
        continue-on-error: true

  benchmark:
    name: Smoke Test Benchmark
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build benchmark tool
        run: swift build -c release --product tinybrain-bench
      
      - name: Test benchmark CLI
        run: .build/release/tinybrain-bench --help

