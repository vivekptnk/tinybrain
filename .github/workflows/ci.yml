name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test --skip TinyBrainDemoTests

      - name: Build (release)
        run: swift build -c release

  benchmark-smoke:
    name: Benchmark Smoke Test
    runs-on: macos-15
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: swift build -c release

      - name: Device info
        run: .build/release/tinybrain-bench --device-info

      - name: Quick benchmark
        run: |
          .build/release/tinybrain-bench \
            --demo --tokens 5 --output json > benchmark-results.json
          cat benchmark-results.json | python3 -m json.tool > /dev/null
          echo "Benchmark JSON is valid"

  test-python:
    name: Python Converter Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest Tests/test_convert_model.py -v --tb=short || [ $? -eq 5 ]
        # Exit code 5 = all tests skipped (converter not fully implemented yet)
